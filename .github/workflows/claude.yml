name: Claude

# Interactive @claude in issues and PR comments. Same opt-in as claude-review:
# add the ANTHROPIC_API_KEY secret and set the CLAUDE_ENABLED repository
# variable to "true" (or run `/install-github-app` in Claude Code). Mention
# @claude in a comment to ask it to read, answer, or open a PR.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: ${{ vars.CLAUDE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
