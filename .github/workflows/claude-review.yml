name: Claude Review

# Automatic PR review by Claude. Disabled until you opt in:
#   1. Add an ANTHROPIC_API_KEY secret (or run `/install-github-app` in Claude Code).
#   2. Set a repository variable CLAUDE_ENABLED = true (Settings ▸ Secrets and
#      variables ▸ Actions ▸ Variables). Until then this job is skipped, so it
#      never shows a red X. It is NOT a required status check.
# Note: on PRs from forks GitHub withholds secrets, so review runs only on
# same-repo PRs.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ vars.CLAUDE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for KassiOS, a zero-dependency Kaspresso-style
            DSL over XCUITest. Follow the review checklist in CLAUDE.md. Prioritise:
            - false-green assertions (assertVisible must require hittability);
            - flaky-safety (elements re-resolve each attempt; one shared time budget);
            - synchronizer coverage — config.synchronizer.waitForIdle in ALL waits;
            - docstring examples that must compile against real signatures;
            - SwiftUI traps (label vs value; secure/formatted field clearing);
            - no new external dependencies.
            Post concise inline comments on the specific lines. Skip style nits
            already covered by SwiftLint. If the PR is clean, say so briefly.
          claude_args: "--max-turns 6"
