name: Docs

# Builds the DocC catalog and publishes it to GitHub Pages.
# Requires Pages to be enabled with "GitHub Actions" as the source
# (repo Settings ▸ Pages).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build DocC archive
        run: |
          set -o pipefail
          xcodebuild docbuild \
            -scheme KassiOS \
            -destination 'platform=macOS' \
            -derivedDataPath docc-build | tail -20
          ARCHIVE=$(find docc-build -type d -name '*.doccarchive' | head -1)
          echo "Archive: $ARCHIVE"
          xcrun docc process-archive transform-for-static-hosting "$ARCHIVE" \
            --output-path _site \
            --hosting-base-path KassiOS

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
