name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict
      - name: Lint the plugin package
        working-directory: Plugins
        run: swiftlint lint --strict

  test:
    name: Build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      # Pure-logic unit tests across every target — including the agent CLI's,
      # which `@testable import`s an executable target (that only SwiftPM's
      # `swift test` resolves; `xcodebuild -scheme` can't). Runs on the macOS
      # host, no simulator.
      - name: Unit tests
        run: |
          set -o pipefail
          swift test 2>&1 | tee swift-test.log | tail -80

      - name: Failing unit tests
        if: failure()
        run: grep -E "error:|failed \(|with [1-9]+ failure" swift-test.log || true

  plugin-lint:
    name: kassios-lint (plugin package)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The nested Plugins/ package depends on swift-syntax (pinned to a 6.3
      # release); build it with the newest Xcode so its toolchain matches. The
      # root package never sees this dependency — that's why it lives here.
      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Show toolchain
        run: swift --version

      - name: Build & test the linter
        working-directory: Plugins
        run: |
          set -o pipefail
          swift build 2>&1 | tail -20
          swift test 2>&1 | tee plugin-test.log | tail -40

      - name: Failing linter tests
        if: failure()
        working-directory: Plugins
        run: grep -E "error:|failed \(|with [1-9]+ failure" plugin-test.log || true

      # Dogfood: run the tool over the repo's own screen objects. Non-strict, so
      # findings are informational and never fail the build.
      - name: Dogfood kassios-lint on the repo's screens
        working-directory: Plugins
        run: swift run kassios-lint ../Examples ../IntegrationTests || true

  ui-tests:
    name: UI tests (simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Generate the integration project (app + UI-test target that compiles the
      # KassiOS sources directly) and run the real UI tests on a simulator.
      - name: Install xcodeproj
        run: sudo gem install xcodeproj

      - name: Generate integration project
        working-directory: IntegrationTests
        run: ruby gen.rb

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          # Prefer a Pro (large screen, most stable); fall back to any iPhone.
          UDID=$(xcrun simctl list devices available | grep -m1 -E 'iPhone [0-9]+ Pro ' | grep -oE '[0-9A-Fa-f-]{36}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -oE '[0-9A-Fa-f-]{36}')
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Reset location permission
        run: |
          # So SystemAlertTests actually raises the location dialog (a warm
          # simulator that already granted/denied it would skip the prompt and
          # false-green the interceptor test).
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl privacy "${{ steps.sim.outputs.udid }}" reset location || true

      - name: Start the kassios-agent (Tier C host bridge)
        run: |
          # Builds and starts the host agent so DeviceTierCTests exercise the
          # real bridge instead of skipping. The agent writes ~/.kassios-agent.json,
          # which the in-simulator test runner reads via $SIMULATOR_HOST_HOME.
          swift build --product kassios-agent
          KASSIOS_AGENT_TOKEN="$(uuidgen)" KASSIOS_AGENT_PORT=8437 \
            nohup .build/debug/kassios-agent > agent.log 2>&1 &
          sleep 2
          cat agent.log || true

      - name: Run UI tests
        working-directory: IntegrationTests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme KassDemoUITests \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -retry-tests-on-failure \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log | tail -100

      - name: Failure details
        if: failure()
        working-directory: IntegrationTests
        run: grep -nE "error:|failed -|Assertion Failure|Failing tests:|XCTAssert" xcodebuild.log | tail -40 || true
